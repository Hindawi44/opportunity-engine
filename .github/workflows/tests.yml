name: تشغيل الاختبارات

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: تنزيل ملفات المشروع
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: تشغيل الاختبارات
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q > pytest-output.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: رفع تقرير الاختبارات
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.log

      - name: إنهاء بالفشل عند فشل الاختبارات
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
