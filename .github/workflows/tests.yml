name: تشغيل الاختبارات

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: تنزيل ملفات المشروع
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: تشغيل الاختبارات
        run: pytest -q
