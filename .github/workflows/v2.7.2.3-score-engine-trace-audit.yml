name: V2.7.2.3 Score Engine Trace Audit

on:
  workflow_dispatch:
    inputs:
      opportunity_limit:
        description: Maximum opportunities to collect and trace
        required: true
        default: '20'

permissions:
  contents: read

jobs:
  score-engine-trace:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}/src
      EXTERNAL_RESEARCH_MAX_OPPORTUNITIES: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify project import
        run: python -c "import opportunity_engine; print('Opportunity Engine imports successfully')"

      - name: Create output folders
        run: mkdir -p data/validation data/investment_files

      - name: Generate fresh real opportunity dataset
        run: |
          python scripts/run_daily_pipeline.py \
            --limit "${{ inputs.opportunity_limit }}" \
            > data/validation/v2.7.2.3-daily-pipeline-run.json

      - name: Run score engine trace audit
        run: |
          python scripts/run_score_engine_trace_audit.py \
            data/todays_opportunities.json \
            --output data/validation/v2.7.2.3-score-engine-trace.json

      - name: Print score engine trace
        if: always()
        run: |
          if [ -f data/validation/v2.7.2.3-score-engine-trace.json ]; then
            python -m json.tool data/validation/v2.7.2.3-score-engine-trace.json
          else
            echo "Score engine trace report was not produced."
          fi

      - name: Upload score trace evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2.7.2.3-score-engine-trace-audit
          path: |
            data/validation/
            data/todays_opportunities.json
            data/investment_files/
          if-no-files-found: warn
          retention-days: 14
