name: V2.11 Live Opportunity Validation

on:
  pull_request:
    paths:
      - "data/live_validation/**"
      - "scripts/run_v211_live_opportunity_validation.py"
      - "tests/test_v211_live_opportunity_validation.py"
      - ".github/workflows/v2.11-live-opportunity-validation.yml"
  workflow_dispatch:

jobs:
  live-opportunity-validation:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Validate live snapshot behavior
        run: pytest -q tests/test_v211_live_opportunity_validation.py

      - name: Generate one live validation report
        run: python scripts/run_v211_live_opportunity_validation.py

      - name: Print one report
        if: always()
        run: cat data/validation/v2.11-live-opportunity-validation.json

      - name: Upload live validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2.11-live-opportunity-validation
          path: data/validation/v2.11-live-opportunity-validation.json
