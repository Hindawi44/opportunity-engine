name: Daily opportunity pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

concurrency:
  group: daily-opportunity-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}/src
      FINN_API_KEY: ${{ secrets.FINN_API_KEY }}
      FINN_ORG_ID: ${{ secrets.FINN_ORG_ID }}
      FINN_MARKET: ${{ vars.FINN_MARKET }}
      KONKURSKUPP_FEED_URL: ${{ secrets.KONKURSKUPP_FEED_URL }}
      KONKURSKUPP_FEED_TOKEN: ${{ secrets.KONKURSKUPP_FEED_TOKEN }}
      BJAROY_FEED_URL: ${{ secrets.BJAROY_FEED_URL }}
      BJAROY_FEED_TOKEN: ${{ secrets.BJAROY_FEED_TOKEN }}
      KONKURS_APP_FEED_URL: ${{ secrets.KONKURS_APP_FEED_URL }}
      KONKURS_APP_FEED_TOKEN: ${{ secrets.KONKURS_APP_FEED_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate today's opportunities
        run: python scripts/run_daily_pipeline.py --output data/todays_opportunities.json
      - name: Commit changed snapshot
        run: |
          if [ -z "$(git status --porcelain -- data/todays_opportunities.json)" ]; then
            echo "No dashboard changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/todays_opportunities.json
          git commit -m "Update today's opportunity snapshot"
          git push
