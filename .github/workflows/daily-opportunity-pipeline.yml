name: Daily opportunity pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

concurrency:
  group: daily-opportunity-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}/src
      FINN_API_KEY: ${{ secrets.FINN_API_KEY }}
      FINN_ORG_ID: ${{ secrets.FINN_ORG_ID }}
      FINN_MARKET: ${{ vars.FINN_MARKET }}
      KONKURSKUPP_FEED_URL: ${{ secrets.KONKURSKUPP_FEED_URL }}
      KONKURSKUPP_FEED_TOKEN: ${{ secrets.KONKURSKUPP_FEED_TOKEN }}
      BJAROY_FEED_URL: ${{ secrets.BJAROY_FEED_URL }}
      BJAROY_FEED_TOKEN: ${{ secrets.BJAROY_FEED_TOKEN }}
      KONKURS_APP_FEED_URL: ${{ secrets.KONKURS_APP_FEED_URL }}
      KONKURS_APP_FEED_TOKEN: ${{ secrets.KONKURS_APP_FEED_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build source coverage report
        run: python scripts/build_source_coverage_report.py
      - name: Generate today's opportunities
        run: python scripts/run_daily_pipeline.py --finn-rows 100 --output data/todays_opportunities.json
      - name: Diagnose empty Auksjonen result
        run: python scripts/annotate_auksjonen_diagnostics.py --snapshot data/todays_opportunities.json
      - name: Build conservative review queue
        run: python scripts/build_opportunity_review_queue.py --snapshot data/todays_opportunities.json --output data/opportunity_review_queue.json --limit 12
      - name: Enrich public Auksjonen listing metadata
        run: python scripts/enrich_auksjonen_listing_metadata.py --queue data/opportunity_review_queue.json --output data/opportunity_review_queue.json --evidence-output data/listing_metadata_evidence.json
      - name: Build market evidence discovery queue
        run: python scripts/build_market_evidence_discovery_queue.py --queue data/opportunity_review_queue.json --output data/market_evidence_discovery_queue.json
      - name: Validate and synchronize economic evidence registry
        run: python scripts/build_opportunity_evidence_registry.py --queue data/opportunity_review_queue.json --existing data/opportunity_evidence.json --output data/opportunity_evidence.json
      - name: Build evidence-gated economic evaluation queue
        run: python scripts/build_economic_evaluation_queue.py --queue data/opportunity_review_queue.json --evidence data/opportunity_evidence.json --output data/economic_evaluation_queue.json
      - name: Build top five actionable opportunity report
        run: python scripts/build_top5_opportunity_report.py --queue data/opportunity_review_queue.json --evaluations data/economic_evaluation_queue.json --output data/top5_opportunities.json --limit 5
      - name: Build separated sale and bankruptcy channels
        run: python scripts/build_opportunity_channels_report.py --actionable data/top5_opportunities.json --output data/opportunity_channels.json --limit 5
      - name: Build transparent per-source funnel
        run: python scripts/build_source_funnel_report.py --coverage data/source_coverage.json --snapshot data/todays_opportunities.json --channels data/opportunity_channels.json --output data/source_funnel.json
      - name: Commit changed snapshots
        run: |
          FILES="data/source_coverage.json data/source_funnel.json data/todays_opportunities.json data/opportunity_review_queue.json data/listing_metadata_evidence.json data/market_evidence_discovery_queue.json data/opportunity_evidence.json data/economic_evaluation_queue.json data/top5_opportunities.json data/opportunity_channels.json"
          if [ -z "$(git status --porcelain -- $FILES)" ]; then
            echo "No opportunity data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "Update daily opportunity snapshots"
          git push
