name: V2.8.2 Comparable Evidence Integration Fix

on:
  workflow_dispatch:
    inputs:
      opportunity_limit:
        description: Maximum opportunities to discover
        required: true
        default: '30'
      research_threshold:
        description: Preliminary research threshold
        required: true
        default: '20'
      selection_limit:
        description: Candidates for focused comparable research
        required: true
        default: '3'

permissions:
  contents: read

jobs:
  comparable-evidence-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PYTHONPATH: ${{ github.workspace }}/src
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      BRAVE_MAX_REQUESTS_PER_RUN: '6'
      BRAVE_CACHE_TTL_HOURS: '0'
      EXTERNAL_RESEARCH_MAX_OPPORTUNITIES: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify Brave secret
        run: |
          if [ -z "${BRAVE_API_KEY}" ]; then
            echo "BRAVE_API_KEY is missing"
            exit 1
          fi

      - name: Restore persistent comparable memory
        uses: actions/cache/restore@v4
        with:
          path: |
            data/evidence
            data/investment_files
            data/opportunity_evidence.json
          key: opportunity-memory-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            opportunity-memory-${{ github.ref_name }}-
            opportunity-memory-main-

      - name: Create output folders
        run: mkdir -p data/validation data/investment_files data/evidence

      - name: Generate fresh opportunity dataset
        run: |
          python scripts/run_daily_pipeline.py \
            --limit "${{ inputs.opportunity_limit }}" \
            > data/validation/v2.8.2-daily-pipeline-run.json

      - name: Collect and integrate market comparables
        run: |
          python scripts/run_v28_comparable_collection.py \
            data/todays_opportunities.json \
            --threshold "${{ inputs.research_threshold }}" \
            --selection-limit "${{ inputs.selection_limit }}" \
            --output data/validation/v2.8.2-comparable-collection.json

      - name: Build persistent comparable report
        run: |
          python scripts/run_external_comparables_report.py \
            --evidence-dir data/evidence \
            --target-count 3 \
            --output data/validation/v2.8.2-external-comparables.json

      - name: Build review queue
        run: |
          python scripts/build_opportunity_review_queue.py \
            --snapshot data/todays_opportunities.json \
            --limit "${{ inputs.opportunity_limit }}" \
            --output data/opportunity_review_queue.json

      - name: Recalculate Financial and Final Investment Scores
        run: |
          python scripts/build_external_financial_scores.py \
            --queue data/opportunity_review_queue.json \
            --evidence-dir data/evidence \
            --existing-evidence data/opportunity_evidence.json \
            --evidence-output data/opportunity_evidence.json \
            --summary-output data/validation/v2.8.2-financial-final-score.json \
            --schema-version 2.8.2

      - name: Normalize incomplete recommendations
        run: |
          python scripts/normalize_incomplete_recommendations.py \
            --scores data/scored_opportunities.json \
            --summary data/validation/v2.8.2-financial-final-score.json

      - name: Print V2.8.2 reports
        if: always()
        run: |
          for report in \
            data/validation/v2.8.2-comparable-collection.json \
            data/validation/v2.8.2-external-comparables.json \
            data/validation/v2.8.2-financial-final-score.json; do
            if [ -f "$report" ]; then
              python -m json.tool "$report"
            fi
          done

      - name: Save persistent comparable memory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/evidence
            data/investment_files
            data/opportunity_evidence.json
          key: opportunity-memory-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload V2.8.2 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2.8.2-comparable-evidence-integration
          path: |
            data/validation/
            data/todays_opportunities.json
            data/opportunity_review_queue.json
            data/opportunity_evidence.json
            data/economic_evaluation_queue.json
            data/scored_opportunities.json
            data/investment_files/
            data/evidence/
          if-no-files-found: warn
          retention-days: 14
