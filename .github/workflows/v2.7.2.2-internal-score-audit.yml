name: V2.7.2.2 Internal Score Audit

on:
  workflow_dispatch:
    inputs:
      opportunity_limit:
        description: Maximum opportunities to collect and audit
        required: true
        default: '20'
      required_score:
        description: External research eligibility threshold
        required: true
        default: '60'

permissions:
  contents: read

jobs:
  internal-score-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}/src
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      BRAVE_MAX_REQUESTS_PER_RUN: '4'
      BRAVE_CACHE_TTL_HOURS: '24'
      EXTERNAL_RESEARCH_MAX_OPPORTUNITIES: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify project import
        run: python -c "import opportunity_engine; print('Opportunity Engine imports successfully')"

      - name: Create output folders
        run: mkdir -p data/validation data/investment_files

      - name: Generate fresh real opportunity dataset
        run: |
          python scripts/run_daily_pipeline.py \
            --limit "${{ inputs.opportunity_limit }}" \
            > data/validation/v2.7.2.2-daily-pipeline-run.json

      - name: Run internal score audit
        run: |
          python scripts/run_internal_score_audit.py \
            data/todays_opportunities.json \
            --required-score "${{ inputs.required_score }}" \
            --output data/validation/v2.7.2.2-internal-score-audit.json

      - name: Print internal score audit
        if: always()
        run: |
          if [ -f data/validation/v2.7.2.2-internal-score-audit.json ]; then
            python -m json.tool data/validation/v2.7.2.2-internal-score-audit.json
          else
            echo "Internal score audit report was not produced."
          fi

      - name: Upload internal score audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2.7.2.2-internal-score-audit
          path: |
            data/validation/
            data/todays_opportunities.json
            data/scored_opportunities.json
            data/economic_evaluation_queue.json
            data/investment_files/
          if-no-files-found: warn
          retention-days: 14
